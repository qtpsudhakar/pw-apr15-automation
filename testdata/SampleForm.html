<html>

<head>
    <title>Sample Form</title>
    <style>
        .demo{
            color: red;
        }
        .xyz{
            font-weight: 700;
        }
        #name{
            border: 1px solid black;
        }
    </style>
</head>

<body>
    <h1>Sample Form</h1>
    <form action="/submit" method="post">
        <label class="demo xyz" for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="enter name here" role="text"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>

        <input type="submit" value="Submit">
    </form>
</body>

</html>
